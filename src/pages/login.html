<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" type="text/css" href="../css/style2.css">
</head>
<body>
    
    <a href="../../index.html" class="logosite"><img src="../images/logo cortada.png" alt="logo site"></a>
    <div class="locallogin">
        <form id="formlogin" name="formlogin" action="pagina_dieta.html" method="POST" class="painellogin">
            <h1 class="textlogin">Faça seu Login</h1>
            <div class="loginbar1">
                <label>Email</label>
                <input type="email" name="emaillogin" id="emaillogin" placeholder="digite aqui" class="barralogin">
            </div>
            <div class="loginbar2">
                <label>Senha</label>
                <input type="password" name="senhalogin" id="senhalogin" placeholder="digite aqui" class="barralogin">
            </div>
            <button type="submit" class="entrar">ENTRAR</button>
            
        </form>
    </div>



    <script src="../js/script2.js"></script>
</body>
</html>
